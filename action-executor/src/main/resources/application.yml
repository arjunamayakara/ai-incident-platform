server:
  port: 8084

spring:
  application:
    name: action-executor
  kafka:
    bootstrap-servers: localhost:9092
  data:
    redis:
      host: localhost
      port: 6379

kafka:
  topics:
    actions: actions

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.aiplatform: INFO
slack:
  enabled: true
  webhook-url: https://hooks.slack.com/services/