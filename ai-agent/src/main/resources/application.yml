server:
  port: 8083

spring:
  application:
    name: ai-agent
  kafka:
    bootstrap-servers: localhost:9092
  data:
    redis:
      host: localhost
      port: 6379

kafka:
  topics:
    incidents: incidents
    actions: actions

# LLM config — swap model here to switch providers
llm:
  ollama:
    base-url: http://localhost:11434
    model: mistral
  timeout-seconds: 120

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.aiplatform: INFO
    com.aiplatform.agent.prompt: DEBUG
    com.aiplatform.agent.store: DEBUG